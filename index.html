  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

'woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* 3D Film Parts — Colour tokens v1.2 (confirmed June 2026)\n   Signal Red is #E8231F everywhere. Older outputs used #E2121B / #e8442a — override them. */\n:root {\n  /* ── Brand / accent ── */\n  --dfp-red:            #E8231F;   /* Signal Red. SPARSE: eyebrow, pill, one headline word, footer arrow */\n  --dfp-gold:           #CBB88F;   /* Warm Gold. Eyebrow accent on DARK backgrounds only */\n\n  /* ── Ink & text ── */\n  --dfp-ink:            #141414;   /* Headlines, primary text, dark chips */\n  --dfp-muted:          #54534F;   /* Sub-lines, secondary copy */\n  --dfp-faint:          #8A8A86;   /* Tertiary labels, meta */\n  --dfp-on-dark:        #FFFFFF;   /* Text on dark / red grounds */\n  --dfp-muted-dark:     #9B988F;   /* Secondary copy on dark */\n  --dfp-faint-dark:     #7D7A72;   /* Tertiary meta on dark */\n\n  /* ── Backgrounds (web / blog) ── */\n  --dfp-bg-base:        #EDEBE5;   /* The warm light-grey field */\n  --dfp-bg-light:       #F6F5F1;   /* Lighter pole of the vignette */\n  --dfp-bg-deep:        #E3E1DA;   /* Darker pole of the vignette */\n  --dfp-bg-field:       radial-gradient(120% 150% at 24% 24%, #F6F5F1 0%, #EDEBE5 52%, #E3E1DA 100%);\n\n  /* ── Social-post grounds (always flat, one per post) ── */\n  --dfp-bg-paper:       #F2EFE8;   /* Direction A · Editorial Light */\n  --dfp-surface:        #FFFFFF;   /* Direction B · Studio Clean + cards + borders */\n  --dfp-bg-dark:        #121211;   /* Direction C · Editorial Dark */\n  --dfp-bg-cinematic:   #0E0E0E;   /* Banner-specific cinematic near-black (darker than dark) */\n\n  /* ── Hairlines & dividers ── */\n  --dfp-hairline-light: #D3CFC3;   /* Footer divider on light */\n  --dfp-hairline-dark:  #2C2B28;   /* Footer divider on dark */\n\n  /* ── Semantic aliases ── */\n  --text-strong:        var(--dfp-ink);\n  --text-body:          var(--dfp-muted);\n  --text-meta:          var(--dfp-faint);\n  --accent:             var(--dfp-red);\n  --accent-dark:        var(--dfp-gold);\n  --surface-card:       var(--dfp-surface);\n  --bg-web:             var(--dfp-bg-field);\n}\n<\u002Fstyle>\n<style>/* 3D Film Parts — Type tokens v1.2\n   Two families only. Archivo Black carries every big editorial moment;\n   JetBrains Mono handles every small technical / label / meta detail.\n   Never introduce a third family. */\n:root {\n  /* ── Families ── */\n  --dfp-font-head:   'Archivo', 'Druk Wide Bold', 'Arial Black', sans-serif; /* use weight 900 = Archivo Black */\n  --dfp-font-mono:   'JetBrains Mono', ui-monospace, monospace;\n\n  /* ── Weights ── */\n  --dfp-w-head:      900;  /* @kind font */ /* headlines — Archivo Black only */\n  --dfp-w-mono-700:  700;  /* @kind font */ /* eyebrow, CTA, labels */\n  --dfp-w-mono-500:  500;  /* @kind font */ /* mid labels */\n  --dfp-w-mono-400:  400;  /* @kind font */ /* spec, descriptor, handle, body */\n\n  /* ── Tracking ── */\n  --dfp-track-head:    -0.035em; /* headlines, tight */\n  --dfp-track-head-2:  -0.03em;  /* product name */\n  --dfp-track-eyebrow: 0.18em;   /* red/gold eyebrow, lowercase */\n  --dfp-track-label:   0.12em;   /* footer CTA / labels, uppercase */\n  --dfp-track-spec:    0.07em;   /* spec / descriptor, uppercase */\n  --dfp-track-meta:    0.05em;   /* handle / meta, lowercase */\n\n  /* ── Line-height ── */\n  --dfp-lh-head:       0.88;  /* @kind font */ /* 0.86–0.92 range; 0.88 default */\n  --dfp-lh-head-tight: 0.86;  /* @kind font */ /* statement scale */\n\n  /* ── Display sizes (social 1080 canvas reference) ── */\n  --dfp-size-head-reg:   54px;\n  --dfp-size-head-lg:    90px;\n  --dfp-size-eyebrow:    15px;\n}\n<\u002Fstyle>\n<style>/* 3D Film Parts — Spacing, shape & elevation tokens v1.2 */\n:root {\n  /* ── Safe margins ── */\n  --dfp-safe-social:    88px;  /* social side margins (1080 canvas) */\n  --dfp-safe-social-sm: 48px;  /* tighter social margin used in product templates */\n  --dfp-safe-hero:      80px;  /* blog hero (1200 scale, ~8%) */\n  --dfp-clear-top:      250px; /* keep headline clear of platform UI (story) */\n  --dfp-clear-bottom:   220px;\n\n  /* ── Radii ── */\n  --dfp-radius-chip:    6px;\n  --dfp-radius-code:    8px;   /* rectangular code badge */\n  --dfp-radius-card:    16px;\n  --dfp-radius-card-lg: 24px;  /* story hero card */\n  --dfp-radius-pill:    999px;\n\n  /* ── Elevation ── */\n  --dfp-card-shadow:    0 22px 48px rgba(20,20,20,.30);\n  --dfp-card-tilt:      3deg;  /* @kind other */ /* ±3° when showing a range of two cards */\n\n  /* ── Eyebrow accent rule ── */\n  --dfp-ebar-w:         46px;\n  --dfp-ebar-h:         3px;\n\n  /* ── Named motifs ── */\n  --dfp-clapper-w:      3px;   /* The Clapper Stripe — vertical red seam */\n  --dfp-border-card:    8px;   /* white border on tilted product cards */\n}\n<\u002Fstyle>\n<script src=\"0727dd9d-9d48-438c-9351-675b152b35d6\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;background:#F2EFE8;}\n  ::selection{background:#E8231F;color:#fff;}\n  input::placeholder{color:#9A968C;}\n  select{appearance:none;-webkit-appearance:none;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#F2EFE8;color:#141414;font-family:'JetBrains Mono',ui-monospace,monospace;display:flex;flex-direction:column;\">\n\n  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:1px solid #D3CFC3;flex:0 0 auto;gap:20px;\">\n    <div style=\"display:flex;align-items:center;gap:18px;\">\n      <a href=\"https://3dfilmparts.com\" target=\"_blank\" rel=\"noopener\" style=\"display:block;transition:opacity .15s;\" style-hover=\"opacity:0.65;\"><img src=\"a50954c2-ca8d-42fe-9e43-804ae6eb843a\" alt=\"3D Film Parts\" style=\"height:26px;width:auto;display:block;\"><\u002Fa>\n      <div style=\"width:1px;height:26px;background:#D3CFC3;\"><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:4px;\">\n        <span style=\"font-family:'Archivo Black',sans-serif;font-size:16px;letter-spacing:-0.01em;text-transform:uppercase;line-height:1;\">Lens Cap Generator<\u002Fspan>\n        <span style=\"font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#54534F;line-height:1;\">UV Print · Rear Cap Graphics<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"https://www.3dfilmparts.com/products/ef-rear-lens-cap-with-custom-graphic\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:8px;background:#E8231F;color:#fff;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:11px 18px;border-radius:999px;transition:background .15s;\" style-hover=\"background:#c81c19;\">Get Yours Printed -&gt;<\u002Fa>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;align-items:flex-start;flex:1 1 auto;min-height:0;\">\n\n    <!-- LEFT: CONTROLS -->\n    <div style=\"flex:1 1 50%;padding:34px 40px 60px;border-right:1px solid #D3CFC3;\">\n\n      <div style=\"font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A86;margin-bottom:12px;\">Quick Start<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:34px;\">\n        <sc-for list=\"{{ presets }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ p.onClick }}\" type=\"button\" style=\"background:transparent;border:1px solid #C9C5BA;color:#54534F;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.04em;padding:8px 14px;border-radius:999px;cursor:pointer;transition:border-color .15s,color .15s;\" style-hover=\"border-color:#E8231F;color:#141414;\">{{ p.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A86;margin-bottom:16px;\">Text<\u002Fdiv>\n\n      <!-- FOCAL (always on) -->\n      <div style=\"margin-bottom:22px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\">\n          <span style=\"font-size:14px;letter-spacing:0.04em;color:#141414;\">FOCAL LENGTH<\u002Fspan>\n          <span style=\"font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#E8231F;\">Always On<\u002Fspan>\n        <\u002Fdiv>\n        <input value=\"{{ focal }}\" onchange=\"{{ onFocal }}\" placeholder=\"50mm\" style=\"width:100%;background:#FFFFFF;border:1px solid #D3CFC3;color:#141414;font-family:'Archivo Black',sans-serif;font-size:26px;letter-spacing:-0.02em;text-transform:uppercase;padding:12px 14px;border-radius:6px;outline:none;\" style-focus=\"border-color:#E8231F;\">\n      <\u002Fdiv>\n\n      <!-- APERTURE -->\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n          <span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimAperture }};\">APERTURE<\u002Fspan>\n          {{ apertureToggle }}\n        <\u002Fdiv>\n        <sc-if value=\"{{ apertureOn }}\" hint-placeholder-val=\"{{ true }}\">\n          <input value=\"{{ aperture }}\" onchange=\"{{ onAperture }}\" placeholder=\"f/1.4\" style=\"margin-top:8px;width:100%;background:#FFFFFF;border:1px solid #D3CFC3;color:#141414;font-family:'JetBrains Mono',monospace;font-size:16px;padding:9px 12px;border-radius:6px;outline:none;\" style-focus=\"border-color:#E8231F;\">\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- LENS NAME -->\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n          <span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimLens }};\">LENS / SERIES NAME<\u002Fspan>\n          {{ lensNameToggle }}\n        <\u002Fdiv>\n        <sc-if value=\"{{ lensNameOn }}\" hint-placeholder-val=\"{{ true }}\">\n          <input value=\"{{ lensName }}\" onchange=\"{{ onLensName }}\" placeholder=\"CANON EF\" style=\"margin-top:8px;width:100%;background:#FFFFFF;border:1px solid #D3CFC3;color:#141414;font-family:'JetBrains Mono',monospace;font-size:16px;padding:9px 12px;border-radius:6px;outline:none;\" style-focus=\"border-color:#E8231F;\">\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- MOUNT -->\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n          <span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimMount }};\">MOUNT TYPE<\u002Fspan>\n          {{ mountToggle }}\n        <\u002Fdiv>\n        <sc-if value=\"{{ mountOn }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:relative;margin-top:8px;\">\n            <select value=\"{{ mount }}\" onchange=\"{{ onMount }}\" style=\"width:100%;background:#FFFFFF;border:1px solid #D3CFC3;color:#141414;font-family:'JetBrains Mono',monospace;font-size:16px;padding:9px 12px;border-radius:6px;outline:none;cursor:pointer;\" style-focus=\"border-color:#E8231F;\">\n              <sc-for list=\"{{ mountOptions }}\" as=\"m\" hint-placeholder-count=\"6\"><option value=\"{{ m }}\">{{ m }}<\u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n            <span style=\"position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:#8A8A86;font-size:13px;\">v<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- FILTER THREAD -->\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n          <span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimFilter }};\">FILTER THREAD<\u002Fspan>\n          {{ filterToggle }}\n        <\u002Fdiv>\n        <sc-if value=\"{{ filterOn }}\" hint-placeholder-val=\"{{ true }}\">\n          <input value=\"{{ filterThread }}\" onchange=\"{{ onFilter }}\" placeholder=\"Ø67\" style=\"margin-top:8px;width:100%;background:#FFFFFF;border:1px solid #D3CFC3;color:#141414;font-family:'JetBrains Mono',monospace;font-size:16px;padding:9px 12px;border-radius:6px;outline:none;\" style-focus=\"border-color:#E8231F;\">\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- CUSTOM NOTE -->\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n          <span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimCustom }};\">CUSTOM NOTE<\u002Fspan>\n          {{ customToggle }}\n        <\u002Fdiv>\n        <sc-if value=\"{{ customOn }}\" hint-placeholder-val=\"{{ true }}\">\n          <input value=\"{{ customNote }}\" onchange=\"{{ onCustom }}\" placeholder=\"Owner name, unit, etc.\" style=\"margin-top:8px;width:100%;background:#FFFFFF;border:1px solid #D3CFC3;color:#141414;font-family:'JetBrains Mono',monospace;font-size:16px;padding:9px 12px;border-radius:6px;outline:none;\" style-focus=\"border-color:#E8231F;\">\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:20px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n          <span style=\"font-size:14px;letter-spacing:0.04em;\">TYPE SCALE<\u002Fspan>\n          <span style=\"font-size:13px;color:#E8231F;\">{{ typeScalePct }}<\u002Fspan>\n        <\u002Fdiv>\n        <input type=\"range\" min=\"0.7\" max=\"1.3\" step=\"0.02\" value=\"{{ typeScale }}\" oninput=\"{{ onTypeScale }}\" style=\"width:100%;accent-color:#E8231F;cursor:pointer;\">\n      <\u002Fdiv>\n\n      <div style=\"height:1px;background:#D3CFC3;margin:28px 0 24px;\"><\u002Fdiv>\n\n      <div style=\"font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A86;margin-bottom:18px;\">Design Elements<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 28px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimRedRing }};\">SIGNAL RED RING<\u002Fspan>{{ redRingToggle }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimClapper }};\">CLAPPER STRIPE<\u002Fspan>{{ clapperToggle }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimArc }};\">RED ARC TRIM<\u002Fspan>{{ redArcToggle }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimMark }};\">3DFP MARK<\u002Fspan>{{ markToggle }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-size:14px;letter-spacing:0.04em;opacity:{{ dimTransparent }};\">TRANSPARENT BG<\u002Fspan>{{ transparentToggle }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ markOn }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:18px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n            <span style=\"font-size:14px;letter-spacing:0.04em;\">3DFP MARK SIZE<\u002Fspan>\n            <span style=\"font-size:13px;color:#E8231F;\">{{ markScalePct }}<\u002Fspan>\n          <\u002Fdiv>\n          <input type=\"range\" min=\"0.5\" max=\"1.6\" step=\"0.02\" value=\"{{ markScale }}\" oninput=\"{{ onMarkScale }}\" style=\"width:100%;accent-color:#E8231F;cursor:pointer;\">\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A86;margin:28px 0 14px;\">Accent Colour<\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;\">\n        <sc-for list=\"{{ accentSwatches }}\" as=\"ac\" hint-placeholder-count=\"10\">\n          <button onclick=\"{{ ac.onClick }}\" type=\"button\" title=\"{{ ac.color }}\" style=\"{{ ac.style }}\"><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A86;margin:28px 0 14px;\">Cap Background<\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:center;\">\n        <sc-for list=\"{{ swatches }}\" as=\"sw\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ sw.onClick }}\" type=\"button\" title=\"{{ sw.color }}\" style=\"{{ sw.style }}\"><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#8A8A86;margin:28px 0 14px;\">Background Image<\u002Fdiv>\n      <label style=\"display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border:1px dashed #C9C5BA;border-radius:8px;padding:14px;cursor:pointer;color:#54534F;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;transition:border-color .15s,color .15s;\" style-hover=\"border-color:#E8231F;color:#141414;\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 16V4\"><\u002Fpath><path d=\"m7 9 5-5 5 5\"><\u002Fpath><path d=\"M5 20h14\"><\u002Fpath><\u002Fsvg>\n        {{ uploadLabel }}\n        <input type=\"file\" accept=\"image/png,image/jpeg,image/svg+xml\" onchange=\"{{ onUpload }}\" style=\"display:none;\">\n      <\u002Flabel>\n      <sc-if value=\"{{ bgImageOn }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:14px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n tps://instagram.com/3dfilmparts\" target=\"_blank\" rel=\"noopener\" style=\"color:#54534F;text-decoration:none;transition:color .15s;\" style-hover=\"color:#141414;\">IG <span style=\"color:#141414;\">@3dfilmparts<\u002Fspan><\u002Fa>\n      <a href=\"https://tiktok.com/@3dfilmparts\" target=\"_blank\" rel=\"noopener\" style=\"color:#54534F;text-decoration:none;transition:color .15s;\" style-hover=\"color:#141414;\">TikTok <span style=\"color:#141414;\">@3dfilmparts<\u002Fspan><\u002Fa>\n      <a href=\"https://youtube.com/@3dfilmparts\" target=\"_blank\" rel=\"noopener\" style=\"color:#54534F;text-decoration:none;transition:color .15s;\" style-hover=\"color:#141414;\">YouTube <span style=\"color:#141414;\">3D Film Parts<\u002Fspan><\u002Fa>\n      <a href=\"https://3dfilmparts.com\" target=\"_blank\" rel=\"noopener\" style=\"color:#54534F;text-decoration:none;transition:color .15s;\" style-hover=\"color:#141414;\">3dfilmparts.com<\u002Fa>\n      <a href=\"https://www.3dfilmparts.com/products/ef-rear-lens-cap-with-custom-graphic\" target=\"_blank\" rel=\"noopener\" style=\"background:#E8231F;color:#fff;text-decoration:none;padding:10px 18px;border-radius:999px;font-weight:700;letter-spacing:0.1em;transition:background .15s;\" style-hover=\"background:#c81c19;\">Get Yours Printed -&gt;<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;defaultBackground&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;#111111&quot;,&quot;#1C1C1C&quot;,&quot;#0A0A0A&quot;,&quot;#FFFFFF&quot;],&quot;default&quot;:&quot;#111111&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Defaults&quot;},&quot;capShadow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Preview&quot;},&quot;showPrintNote&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Preview&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = {\n      focal: '50mm',\n      aperture: 'f/1.4', apertureOn: true,\n      lensName: 'CANON EF', lensNameOn: true,\n      mount: 'EF', mountOn: true,\n      filterThread: 'Ø67', filterOn: false,\n      customNote: '', customOn: false,\n      redRingOn: true,\n      clapperOn: true,\n      redArcOn: false,\n      markOn: false,\n      transparentOn: false,\n      fileName: '',\n      typeScale: 1,\n      accent: '#E8231F',\n      markScale: 1,\n      bgImage: null,\n      bgImageOn: false,\n      bgImageOpacity: 1,\n      bgImageScale: 1,\n      bg: (props && props.defaultBackground) || '#111111'\n    };\n  }\n\n  componentDidMount(){\n    this._loadLogo('assets/logo-white-transparent.png','white');\n    this._loadLogo('assets/logo-ink-transparent.png','ink');\n  }\n  _loadLogo(path, key){\n    fetch(path).then(r=>r.blob()).then(b=>new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.readAsDataURL(b); }))\n      .then(url=>{ this._logos = this._logos || {}; this._logos[key] = url; this.forceUpdate(); }).catch(()=>{});\n  }\n\n  set(key){ return (e)=> this.setState({ [key]: e.target.value }); }\n  toggle(key){ return ()=> this.setState(s=>({ [key]: !s[key] })); }\n  onUpload(e){\n    const f = e.target.files && e.target.files[0];\n    if(!f) return;\n    const fr = new FileReader();\n    fr.onload = ()=> this.setState({ bgImage: fr.result, bgImageOn: true });\n    fr.readAsDataURL(f);\n    e.target.value = '';\n  }\n\n  toggleEl(on, onClick){\n    return React.createElement('button', {\n      type:'button', onClick, 'aria-pressed': on,\n      style:{ width:'34px', height:'20px', borderRadius:'999px', border:'none', padding:0,\n        cursor:'pointer', flex:'0 0 auto', position:'relative',\n        background: on ? '#E8231F' : '#C9C5BA', transition:'background .16s ease' }\n    }, React.createElement('span', { style:{ position:'absolute', top:'2px', left: on?'16px':'2px',\n        width:'16px', height:'16px', borderRadius:'50%', background:'#fff',\n        transition:'left .16s ease', boxShadow:'0 1px 2px rgba(20,20,20,.25)' } }));\n  }\n\n  focalSize(str){\n    const n = (str||'').length;\n    if(n<=4) return 106;\n    if(n===5) return 92;\n    if(n<=7) return 74;\n    if(n<=9) return 58;\n    return 46;\n  }\n\n  esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;'); }\n\n  buildSVG(forExport){\n    const s = this.state;\n    const CX=250, CY=250, R=228;\n    const isWhite = s.bg === '#FFFFFF';\n    const RED = s.accent || '#E8231F';\n    const white = isWhite ? '#111111' : '#FFFFFF';\n    const c42 = isWhite ? 'rgba(0,0,0,0.42)' : 'rgba(255,255,255,0.42)';\n    const c12 = isWhite ? 'rgba(0,0,0,0.13)' : 'rgba(255,255,255,0.12)';\n    const c11 = isWhite ? 'rgba(0,0,0,0.11)' : 'rgba(255,255,255,0.11)';\n    const stripe = isWhite ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';\n    const MONO = \"'JetBrains Mono', ui-monospace, monospace\";\n    const ARCH = \"'Archivo Black', sans-serif\";\n    const scale = s.typeScale || 1;\n    const fs = (px)=> +(px*scale).toFixed(2);\n\n    const bottomStart = CY + (s.apertureOn ? 96 : 72);\n    const layers = [];\n\n    // background circle\n    if(!s.transparentOn){\n      layers.push(`<circle cx=\"${CX}\" cy=\"${CY}\" r=\"${R}\" fill=\"${s.bg}\"/>`);\n    }\n    // uploaded background image (clipped to the cap)\n    if(s.bgImageOn && s.bgImage){\n      const isc = s.bgImageScale || 1;\n      const isz = 456*isc, ipos = 250 - isz/2;\n      layers.push(`<image href=\"${s.bgImage}\" x=\"${ipos.toFixed(1)}\" y=\"${ipos.toFixed(1)}\" width=\"${isz.toFixed(1)}\" height=\"${isz.toFixed(1)}\" preserveAspectRatio=\"xMidYMid slice\" clip-path=\"url(#capClip)\" opacity=\"${s.bgImageOpacity}\"/>`);\n    }\n    // clapper stripe\n    if(s.clapperOn){\n      layers.push(`<circle cx=\"${CX}\" cy=\"${CY}\" r=\"${R}\" fill=\"url(#clapper)\" clip-path=\"url(#capClip)\"/>`);\n    }\n    // outer definition ring (cap edge)\n    layers.push(`<circle cx=\"${CX}\" cy=\"${CY}\" r=\"${R}\" fill=\"none\" stroke=\"${c12}\" stroke-width=\"1\"/>`);\n    // signal red ring + inner decorative ring\n    if(s.redRingOn){\n      layers.push(`<circle cx=\"${CX}\" cy=\"${CY}\" r=\"216\" fill=\"none\" stroke=\"${RED}\" stroke-width=\"5\"/>`);\n      layers.push(`<circle cx=\"${CX}\" cy=\"${CY}\" r=\"203\" fill=\"none\" stroke=\"${c42}\" stroke-width=\"0.75\"/>`);\n    }\n    // red arc trim (racing stripe hugging the base, through the bottom)\n    if(s.redArcOn){\n      const arcR=220, a0=160*Math.PI/180, a1=20*Math.PI/180;\n      const x0=(CX+arcR*Math.cos(a0)).toFixed(2), y0=(CY+arcR*Math.sin(a0)).toFixed(2);\n      const x1=(CX+arcR*Math.cos(a1)).toFixed(2), y1=(CY+arcR*Math.sin(a1)).toFixed(2);\n      layers.push(`<path d=\"M ${x0} ${y0} A ${arcR} ${arcR} 0 0 0 ${x1} ${y1}\" fill=\"none\" stroke=\"${RED}\" stroke-width=\"9\" stroke-linecap=\"round\"/>`);\n    }\n\n    // text layers\n    if(s.customOn && s.customNote){\n      layers.push(`<text x=\"${CX}\" y=\"112\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"${MONO}\" font-size=\"${fs(11)}\" font-weight=\"400\" letter-spacing=\"0.5\" fill=\"${c12}\">${this.esc(s.customNote)}<\u002Ftext>`);\n    }\n    if(s.lensNameOn && s.lensName){\n      layers.push(`<text x=\"${CX}\" y=\"182\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"${MONO}\" font-size=\"${fs(16)}\" font-weight=\"400\" letter-spacing=\"5\" fill=\"${c42}\">${this.esc(s.lensName)}<\u002Ftext>`);\n    }\n    // focal hero\n    const fsize = fs(this.focalSize(s.focal));\n    layers.push(`<text x=\"${CX}\" y=\"250\" text-anchor=\"middle\" dominant-baseline=\"central\" font-family=\"${ARCH}\" font-size=\"${fsize}\" font-weight
